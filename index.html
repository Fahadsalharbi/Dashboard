<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المكتب الاستراتيجي</title>
    <link href="https://fonts.cdnfonts.com/css/dubai" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0b9a91;
            --secondary: #534741;
            --bg: #cbd5e1;
            --white: #ffffff;
            --accent: #0f766e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Dubai', sans-serif; }

        body {
            background-color: #f8fafc; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
            justify-content: center; 
        }
        
        .main-container {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            background: #ffffff; 
            padding: 3.5rem 2rem;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .header-section {
            margin-bottom: 3.5rem;
        }

        .main-logo {
            width: 100px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
        }

        h1 {
            color: var(--secondary);
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .subtitle {
            color: var(--primary);
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-top: 2px solid var(--primary);
            display: inline-block;
            padding-top: 5px;
            margin-top: 5px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        .portal-card {
            background: var(--white);
            padding: 3rem 1.5rem;
            border-radius: 28px;
            text-decoration: none;
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(226, 232, 240, 0.8);
            position: relative;
        }

        .portal-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 45px -12px rgba(11, 154, 145, 0.25);
            background: #fdfdfd;
            border-color: var(--primary);
        }

        .icon-box {
            width: 90px;
            height: 90px;
            background: #f0fdfa;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1.8rem;
            font-size: 3rem;
            transition: 0.4s;
            box-shadow: inset 0 0 0 1px rgba(11, 154, 145, 0.1);
        }

        .portal-card:hover .icon-box {
            background: var(--primary);
            color: white;
            transform: scale(1.1) rotate(-3deg);
        }

        .portal-card:hover .icon-box svg {
            stroke: white;
        }

        .card-title {
            color: var(--secondary);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .card-desc {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        @media (max-width: 600px) {
            body { padding: 15px 10px; }
            h1 { font-size: 1.6rem; padding: 0 10px; }
            .subtitle { font-size: 1.1rem; }
            .portal-card { padding: 2.5rem 1.5rem; }
            .cards-grid { gap: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header class="header-section">
            <img src="bso.png" alt="شعار المكتب" class="main-logo">
            <h1>المكتب الاستراتيجي لتطوير منطقة الباحة</h1>
            <p class="subtitle">أنظمة السكرتارية الخاصة</p>
        </header>

        <div class="cards-grid">
            <a href="https://fahadsalharbi.github.io/Briefing-Note/" target="_self" class="portal-card">
                <div class="icon-box">
                    <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#0b9a91" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </div>
                <div class="card-title">قصاصات المكتب</div>
                <p class="card-desc">إعداد التذكيرات، التوجيهات العاجلة، وقصاصات العرض اليومية</p>
            </a>

            <a href="https://fahadsalharbi.github.io/agenda/" target="_self" class="portal-card">
                <div class="icon-box">
                    <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#0b9a91" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </div>
                <div class="card-title">جدول الأعمال</div>
                <p class="card-desc">تنظيم وتوثيق المواعيد اليومية لسعادة الرئيس التنفيذي</p>
            </a>

            <a href="https://fahadsalharbi.github.io/Calendar/" target="_self" class="portal-card">
                <div class="icon-box">
                    <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#0b9a91" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15.5a5 5 0 1 1-7 0a5 5 0 0 1 7 0z"></path>
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </div>
                <div class="card-title">التقويم الشهري</div>
                <p class="card-desc">عرض التقويم واضافة المواعيد المهمة لسعادة الرئيس التنفيذي</p>
            </a>
        </div>
    </div>

</body>
</html>
